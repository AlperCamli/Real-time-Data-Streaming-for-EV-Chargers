global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: simulator
    static_configs:
      - targets: ["host.docker.internal:9200"]
  - job_name: processor
    static_configs:
      - targets: ["host.docker.internal:9100"]
  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]
