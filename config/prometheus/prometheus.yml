global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: processor-placeholder
    static_configs:
      - targets: ["host.docker.internal:9100"]
  - job_name: simulator-placeholder
    static_configs:
      - targets: ["host.docker.internal:9200"]
