services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cs-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cs-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command: >
      bash -c "
      cub kafka-ready -b kafka:9092 1 30 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cs.ev.events.raw --partitions 6 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cs.ev.events.dlq --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cs.ev.events.late --partitions 3 --replication-factor 1
      "

  redis:
    image: redis:7-alpine
    container_name: cs-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cs-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9363:9363"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse:/docker-entrypoint-initdb.d
      - ./config/clickhouse/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host localhost --port 9000 --user ${CLICKHOUSE_USER:-default} --password ${CLICKHOUSE_PASSWORD:-password} --query 'SELECT 1' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  processor:
    build:
      context: .
      dockerfile: Dockerfile
    image: chargesquare-app:latest
    container_name: cs-processor
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: ["sh", "-c", "python -m src.processor.main --config $${PROCESSOR_CONFIG_PATH:-config/processor.default.yaml}"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_HOST: 0.0.0.0
      PROCESSOR_METRICS_PORT: ${PROCESSOR_METRICS_PORT:-9100}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-cs.ev.events.raw}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-cs.ev.events.dlq}
      KAFKA_TOPIC_LATE: ${KAFKA_TOPIC_LATE:-cs.ev.events.late}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-cs-processor}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS:-86400}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
    ports:
      - "9100:9100"

  simulator:
    image: chargesquare-app:latest
    container_name: cs-simulator
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m src.simulator.main --config $${SIMULATOR_CONFIG_PATH:-config/simulator.default.yaml}"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_HOST: 0.0.0.0
      SIMULATOR_METRICS_PORT: ${SIMULATOR_METRICS_PORT:-9200}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-cs.ev.events.raw}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-cs.ev.events.dlq}
      KAFKA_TOPIC_LATE: ${KAFKA_TOPIC_LATE:-cs.ev.events.late}
    ports:
      - "9200:9200"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: cs-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Jm7TRdE@mZYZ98
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  clickhouse_data:
  grafana_data:
